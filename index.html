<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 12 border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats { background: #e3f2fd; color: #0d47a1; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .completed { background: #6c757d !important; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="setup">
        <div class="card">
            <h3>FaucetPay Email</h3>
            <input type="text" id="fp_addr" placeholder="Faucetpay">
            <button onclick="saveUser()">Save</button>
        </div>
    </div>

    <div id="main" style="display:none;">
        <div class="card stats">
            Your Daily Earnings <span id="total_earn">0</span> Satoshi LTC
        </div>

<div class="card" style="background: #24A1DE; color: white; border: none;">
    <h4 style="margin: 5px;">📢 Join Our Community</h4>
    <p style="font-size: 12px;">Get new tasks and updates!</p>
    <button onclick="joinGroup()" style="background: white; color: #24A1DE; font-weight: bold; border-radius: 20px;">JOIN GROUP</button>
</div>

        
        <div class="card">
            <h4>Task 1 (100 Satoshi)</h4>
            <p>internetdefteri.blogspot.com</p>
            <button id="btn_task1" onclick="doTask('https://internetdefteri.blogspot.com', 'task1')">Visit Task (15s)</button>
        </div>

        <div class="card">
            <h4>Task 2 (120 Satoshi)</h4>
            <p>adreslistele.blogspot.com</p>
            <button id="btn_task2" onclick="doTask('https://adreslistele.blogspot.com', 'task2')">Visit Task (15s)</button>
        </div>
    </div>

    <script>
function joinGroup() {
    // Kendi grup kullanıcı adını @ olmadan yaz
    tg.openTelegramLink('https://t.me/earnfreefaucetwin');
}

        
        const tg = window.Telegram.WebApp;
        tg.ready(); // Telegram'a uygulamanın hazır olduğunu bildir

        const WORKER_URL = "https://old-cherry-cabc.ahmtbke58.workers.dev/";
        let start, activeTask = null;

        window.onload = () => {
            const saved = localStorage.getItem('fp_user');
            if(saved) loadDashboard(saved);
        };

        function saveUser() {
            const val = document.getElementById('fp_addr').value;
            if(val) { localStorage.setItem('fp_user', val); loadDashboard(val); }
        }

        async function loadDashboard(addr) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            
            const uid = tg.initDataUnsafe.user.id;
            const res = await fetch(`${WORKER_URL}/status?userId=${uid}`);
            const data = await res.json();
            
            document.getElementById('total_earn').innerText = data.totalToday || 0;
            if(data.task1) lockBtn('btn_task1');
            if(data.task2) lockBtn('btn_task2');
        }

        function lockBtn(id) {
            const b = document.getElementById(id);
            b.disabled = true; b.classList.add('completed'); b.innerText = "Tamamlandı";
        }

        function doTask(url, id) {
            start = Date.now(); activeTask = id;
            tg.openLink(url);
        }

        window.onfocus = async () => {
            if(activeTask) {
                const diff = Math.floor((Date.now() - start) / 1000);
                if(diff >= 15) {
                    const res = await fetch(`${WORKER_URL}/payout`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            address: localStorage.getItem('fp_user'),
                            task_id: activeTask,
                            initData: tg.initData
                        })
                    });
                    const result = await res.json();
                    tg.showAlert(result.message);
                    if(result.success) loadDashboard(localStorage.getItem('fp_user'));
                } else {
                    tg.showAlert("Erken döndün! Süre dolmadı.");
                }
                activeTask = null;
            }
        };
    </script>
</body>
</html>
