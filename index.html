<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats { background: #e3f2fd; color: #0d47a1; font-weight: bold; }
        
        /* Buton Görünümlü Linkler */
        .task-link { 
            display: block; 
            background: #0088cc; 
            color: white; 
            text-decoration: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .task-link:active { transform: scale(0.98); }
        
        /* Tamamlanmış Görev Stili */
        .completed { 
            background: #6c757d !important; 
            pointer-events: none; /* Tıklamayı engeller */
            cursor: not-allowed; 
        }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button#save-btn { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="card">
            <h3>FaucetPay Email</h3>
            <input type="email" id="fp_addr" placeholder="example@gmail.com">
            <button id="save-btn" onclick="saveUser()">Kaydet ve Başla</button>
        </div>
    </div>

    <div id="main" style="display:none;">
        <div class="card stats">
            Günlük Kazancın: <span id="total_earn">0</span> Satoshi LTC
        </div>

        <!-- Görev 1 -->
        <div class="card">
            <h4>Görev 1 (100 Satoshi)</h4>
            <p style="font-size: 12px; color: #777;">https://internetdefteri.blogspot.com</p>
            <a href="https://internetdefteri.blogspot.com" 
               id="link_task1" 
               class="task-link" 
               target="_blank" 
               onclick="startTask('task1')">Go Task 1 (15s)</a>
        </div>

        <!-- Görev 2 -->
        <div class="card">
            <h4>Görev 2 (120 Satoshi)</h4>
            <p style="font-size: 12px; color: #777;">https://adreslistele.blogspot.com</p>
            <a href="https://adreslistele.blogspot.com" 
               id="link_task2" 
               class="task-link" 
               target="_blank" 
               onclick="startTask('task2')">Go Task 2 (15s)</a>
        </div>
    
    <div class="card">
       <a href="" id=link_task3"class=task-link" target=_blank" onclick="startTask('task3')">Google 815s)Photos</a>
      </div>  </div>  
    <script>
function goToTask(url, taskId) {
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || "test_user";
    
    // URL'de halihazırda parametre varsa (?) yoksa (&) eklemesi yapalım
    const separator = url.includes('?') ? '&' : '?';
    const finalUrl = `${url}${separator}uid=${userId}&task=${taskId}&source=tgbot`;
    
    console.log("Gidilen URL:", finalUrl); // Masaüstünde test ediyorsanız konsoldan bakın
    tg.openLink(finalUrl);
}
        
        const tg = window.Telegram.WebApp;
        tg.ready();

        const WORKER_URL = "https://workers.dev";
        let startTime, activeTaskId = null;

        window.onload = () => {
            const savedEmail = localStorage.getItem('fp_user');
            if (savedEmail) loadDashboard(savedEmail);
        };

        function saveUser() {
            const email = document.getElementById('fp_addr').value.trim();
            if (email && email.includes('@')) {
                localStorage.setItem('fp_user', email);
                loadDashboard(email);
            } else {
                alert("Lütfen geçerli bir e-posta girin.");
            }
        }

        async function loadDashboard(email) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            
            try {
                const userId = tg.initDataUnsafe?.user?.id || "test_user";
                const res = await fetch(`${WORKER_URL}/status?userId=${userId}`);
                const data = await res.json();
                
                document.getElementById('total_earn').innerText = data.totalToday || 0;
                if (data.task1) lockLink('link_task1');
                if (data.task2) lockLink('link_task2');
            } catch (err) { console.log("Hata:", err); }
        }

        function lockLink(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('completed');
                el.innerText = "Tamamlandı";
                el.href = "javascript:void(0)"; // Linki işlevsiz yap
            }
        }

        function startTask(taskId) {
            startTime = Date.now();
            activeTaskId = taskId;
        }

        // Kullanıcı geri geldiğinde kontrol mekanizması
        window.onfocus = async () => {
            if (activeTaskId) {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                if (diff >= 15) {
                    const res = await fetch(`${WORKER_URL}/payout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            address: localStorage.getItem('fp_user'),
                            task_id: activeTaskId,
                            initData: tg.initData
                        })
                    });
                    const result = await res.json();
                    tg.showAlert(result.message);
                    if (result.success) loadDashboard(localStorage.getItem('fp_user'));
                } else {
                    tg.showAlert("Çok erken döndünüz! Lütfen 15 saniye bekleyin.");
                }
                activeTaskId = null;
            }
        };
    </script>
</body>
</html>
