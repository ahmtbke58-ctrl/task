<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats { background: #e3f2fd; color: #0d47a1; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .completed { background: #6c757d !important; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #main { display: none; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="card">
            <h3>FaucetPay Email</h3>
            <p style="font-size: 13px; color: #666;">Ödemelerin yatırılacağı e-posta adresini girin.</p>
            <input type="email" id="fp_addr" placeholder="example@gmail.com">
            <button onclick="saveUser()">Kaydet ve Başla</button>
        </div>
    </div>

    <div id="main">
        <div class="card stats">
            Günlük Kazancın: <span id="total_earn">0</span> Satoshi LTC
        </div>

        <div class="card" style="background: #24A1DE; color: white; border: none;">
            <h4 style="margin: 5px;">📢 Topluluğumuza Katıl</h4>
            <p style="font-size: 12px;">Yeni görevler ve güncellemeler için takip et!</p>
            <button onclick="joinGroup()" style="background: white; color: #24A1DE; border-radius: 20px;">GRUBA KATIL</button>
        </div>

        <div class="card">
            <h4>Görev 1 (100 Satoshi)</h4>
            <p style="font-size: 12px; color: #777;">internetdefteri.blogspot.com</p>
            <button id="btn_task1" onclick="doTask('https://internetdefteri.blogspot.com', 'task1')">Görevi Ziyaret Et (15s)</button>
        </div>

        <div class="card">
            <h4>Görev 2 (120 Satoshi)</h4>
            <p style="font-size: 12px; color: #777;">adreslistele.blogspot.com</p>
            <button id="btn_task2" onclick="doTask('https://adreslistele.blogspot.com', 'task2')">Görevi Ziyaret Et (15s)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Uygulamayı tam ekran yap

        const WORKER_URL = "https://old-cherry-cabc.ahmtbke58.workers.dev";
        let startTime, activeTaskId = null;

        window.onload = () => {
            const savedEmail = localStorage.getItem('fp_user');
            if (savedEmail) {
                loadDashboard(savedEmail);
            }
        };

        function saveUser() {
            const email = document.getElementById('fp_addr').value.trim();
            if (email && email.includes('@')) {
                localStorage.setItem('fp_user', email);
                loadDashboard(email);
            } else {
                tg.showAlert("Lütfen geçerli bir FaucetPay e-postası girin.");
            }
        }

        async function loadDashboard(email) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            
            try {
                const userId = tg.initDataUnsafe?.user?.id || "test_user";
                const res = await fetch(`${WORKER_URL}/status?userId=${userId}`);
                const data = await res.json();
                
                document.getElementById('total_earn').innerText = data.totalToday || 0;
                if (data.task1) lockBtn('btn_task1');
                if (data.task2) lockBtn('btn_task2');
            } catch (err) {
                console.error("Dashboard yüklenirken hata:", err);
            }
        }

        function lockBtn(id) {
            const btn = document.getElementById(id);
            if (btn) {
                btn.disabled = true;
                btn.classList.add('completed');
                btn.innerText = "Tamamlandı";
            }
        }

        function doTask(url, taskId) {
            startTime = Date.now();
            activeTaskId = taskId;
            tg.openLink(url);
        }

        function joinGroup() {
            tg.openTelegramLink('https://t.me/earnfreefaucetwin');
        }

        // Kullanıcı sayfaya geri döndüğünde kontrol et
        window.onfocus = async () => {
            if (activeTaskId) {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                if (diff >= 15) {
                    tg.showConfirm("Süre doldu, ödülünüz kontrol ediliyor...", async (confirmed) => {
                        const res = await fetch(`${WORKER_URL}/payout`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                address: localStorage.getItem('fp_user'),
                                task_id: activeTaskId,
                                initData: tg.initData
                            })
                        });
                        const result = await res.json();
                        tg.showAlert(result.message);
                        if (result.success) {
                            loadDashboard(localStorage.getItem('fp_user'));
                        }
                    });
                } else {
                    tg.showAlert(`Henüz ${diff} saniye geçti. Lütfen 15 saniye bekleyin!`);
                }
                activeTaskId = null;
            }
        };
    </script>
</body>
</html>
