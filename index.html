<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Telegram SDK'sının en güncel hali -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        .external-link { color: #0088cc; text-decoration: underline; cursor: pointer; font-weight: bold; display: block; margin-top: 10px; font-size: 16px; }
        .completed-link { color: #6c757d !important; text-decoration: none !important; cursor: not-allowed; pointer-events: none; }
        input { width: 85%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="card">
            <h3>FaucetPay Email</h3>
            <input type="text" id="fp_addr" placeholder="Email adresinizi girin">
            <a href="javascript:void(0)" class="external-link" onclick="saveUser()">[ KAYDET VE BAŞLA ]</a>
        </div>
    </div>

    <div id="main" style="display:none;">
        <div class="card" style="background: #24A1DE; color: white;">
            <h4 style="margin: 5px;">📢 Topluluğumuz</h4>
            <a href="https://t.me" target="_blank" onclick="joinGroup(event)" style="color: yellow; font-weight: bold;">Kanalımıza Katılmak İçin Tıklayın</a>
        </div>

        <div class="card">
            <h4>Görev 1 (100 Satoshi)</h4>
            <p>://blogspot.com</p>
            <!-- Dış Link Yapısı -->
            <a id="btn_task1" href="https://://blogspot.com" target="_blank" class="external-link" 
               onclick="handleTask(event, 'https://://blogspot.com', 'task1')">
               Görevi Aç ve 15 Saniye Bekle
            </a>
        </div>

        <div class="card">
            <h4>Görev 2 (120 Satoshi)</h4>
            <p>://blogspot.com</p>
            <a id="btn_task2" href="https://://blogspot.com" target="_blank" class="external-link" 
               onclick="handleTask(event, 'https://://blogspot.com', 'task2')">
               Görevi Aç ve 15 Saniye Bekle
            </a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Uygulamayı tam ekran yap

        let start, activeTask = null;

        function saveUser() {
            const val = document.getElementById('fp_addr').value;
            if(val) { localStorage.setItem('fp_user', val); location.reload(); }
        }

        window.onload = () => {
            const saved = localStorage.getItem('fp_user');
            if(saved) {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }
        };

        // Görev Tıklama Yönetimi
        function handleTask(event, url, id) {
            // Telegram SDK bazen linki kendi açmak ister, bazen tarayıcıya bırakır
            // Bu yüzden önce süreyi başlatıyoruz
            start = Date.now();
            activeTask = id;

            // Eğer Telegram içindeysek özel metotla açmayı dene
            if (tg.openLink) {
                event.preventDefault();
                tg.openLink(url);
            }
            // openLink çalışmazsa href üzerinden standart açılış gerçekleşecek
        }

        function joinGroup(event) {
            if (tg.openTelegramLink) {
                event.preventDefault();
                tg.openTelegramLink('https://t.me');
            }
        }

        // Kullanıcı sayfaya geri döndüğünde ödülü kontrol et
        window.onfocus = () => {
            if(activeTask) {
                const diff = Math.floor((Date.now() - start) / 1000);
                if(diff >= 15) {
                    alert("Tebrikler! Görev tamamlandı. (Süre: " + diff + "sn)");
                    // Burada kendi API / Payout kodlarını ekleyebilirsin
                    document.getElementById('btn_' + activeTask).classList.add('completed-link');
                    document.getElementById('btn_' + activeTask).innerText = "Tamamlandı ✅";
                } else {
                    tg.showAlert("Çok erken döndün! Lütfen en az 15 saniye kalın.");
                }
                activeTask = null;
            }
        };
    </script>
</body>
</html>
