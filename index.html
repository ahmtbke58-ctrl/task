<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Telegram WebApp Kütüphanesi -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; margin: 0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stats { background: #0088cc; color: white; font-weight: bold; font-size: 18px; }
        .task-btn { display: block; background: #0088cc; color: white !important; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; border: none; width: 100%; font-size: 16px; }
        .completed { background: #6c757d !important; pointer-events: none; opacity: 0.6; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        #setup, #main { display: none; }
        h3, h4 { margin-top: 0; }
    </style>
</head>
<body>

    <!-- Kayıt Ekranı -->
    <div id="setup">
        <div class="card">
            <h3>Hoş Geldiniz</h3>
            <p>Ödemeler için FaucetPay e-postanızı girin:</p>
            <input type="email" id="fp_addr" placeholder="example@gmail.com">
            <button class="task-btn" onclick="saveUser()">KAYDET VE BAŞLA</button>
        </div>
    </div>

    <!-- Ana Panel -->
    <div id="main">
        <div class="card stats">
            Bakiyeniz: <span id="total_earn">0</span> Satoshi LTC
        </div>
        
        <div class="card">
            <h4>Görev 1 (100 Satoshi)</h4>
            <button id="btn_task1" class="task-btn" onclick="goToTask('https://blogspot.com', 'task1')">Görevi Başlat</button>
        </div>

        <div class="card">
            <h4>Görev 2 (120 Satoshi)</h4>
            <button id="btn_task2" class="task-btn" onclick="goToTask('https://blogspot.com', 'task2')">Görevi Başlat</button>
        </div>
    </div>

    <script>
        // Telegram WebApp Başlatma
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://workers.dev";

        // Uygulama açıldığında çalışacak ana fonksiyon
        function initApp() {
            tg.ready();
            tg.expand();

            const savedEmail = localStorage.getItem('fp_user');
            // Telegram'dan gelen start parametresini al (?startapp=task1 gibi)
            const finishedTask = tg.initDataUnsafe.start_param;

            if (savedEmail) {
                // Dashboard'u göster
                document.getElementById('main').style.display = 'block';
                
                // Eğer bir görevden dönüş parametresi varsa ödemeyi işle
                if (finishedTask) {
                    processPayout(savedEmail, finishedTask);
                } else {
                    loadDashboard(savedEmail);
                }
            } else {
                // Kayıtlı değilse giriş ekranını göster
                document.getElementById('setup').style.display = 'block';
            }
        }

        function saveUser() {
            const email = document.getElementById('fp_addr').value.trim();
            if (email.includes('@')) {
                localStorage.setItem('fp_user', email);
                // Sayfayı yenileyerek initApp'in tekrar çalışmasını sağla
                window.location.reload();
            } else {
                tg.showAlert("Geçerli bir e-posta adresi girin!");
            }
        }

        async function processPayout(email, taskId) {
            tg.showConfirm(taskId + " görevi için ödülünüzü almak istiyor musunuz?", async (ok) => {
                if (ok) {
                    try {
                        const response = await fetch(WORKER_URL + "/payout", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                address: email, 
                                task_id: taskId, 
                                initData: tg.initData 
                            })
                        });
                        const result = await response.json();
                        tg.showAlert(result.message || "İşlem başarılı!");
                        loadDashboard(email);
                    } catch (e) {
                        tg.showAlert("Hata: Ödeme sunucusuna ulaşılamadı.");
                    }
                } else {
                    loadDashboard(email);
                }
            });
        }

        async function loadDashboard(email) {
            try {
                const uid = tg.initDataUnsafe.user?.id || "test_user";
                const response = await fetch(WORKER_URL + "/status?userId=" + uid);
                const data = await response.json();
                
                document.getElementById('total_earn').innerText = data.totalToday || 0;
                
                // Görev butonlarını kilitleme
                if(data.task1) lockBtn('btn_task1');
                if(data.task2) lockBtn('btn_task2');
            } catch (e) {
                console.log("Veri çekme hatası.");
            }
        }

        function lockBtn(id) {
            const btn = document.getElementById(id);
            if(btn) {
                btn.classList.add('completed');
                btn.innerText = "Tamamlandı";
                btn.onclick = null;
            }
        }

        function goToTask(url, taskId) {
            // Blogspot'a giderken parametre ekle
            const finalUrl = url + (url.indexOf('?') > -1 ? '&' : '?') + "source=tgbot&task=" + taskId;
            tg.openLink(finalUrl);
        }

        // Sayfa yüklendiğinde başlat
        window.onload = initApp;
    </script>
</body>
</html>
